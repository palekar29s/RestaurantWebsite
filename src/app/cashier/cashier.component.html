<div class="cashier-dashboard">

  <div class="top-bar">
    <h2>Cashier Dashboard</h2>
    <button (click)="logout()">Logout</button>
  </div>

  <div class="welcome-box">
    <h3>Welcome {{ userEmail }}</h3>
    <p>Handle customer billing and payment processing</p>
  </div>

  <div class="dashboard-grid">

    <div class="dashboard-card" (click)="goToOrders()">
      <h3>Customer Orders</h3>
      <p>View completed customer orders</p>
    </div>

    <div class="dashboard-card" (click)="goToPayments()">
      <h3>Payments</h3>
      <p>Process and manage customer payments</p>
    </div>

  </div>

</div>
