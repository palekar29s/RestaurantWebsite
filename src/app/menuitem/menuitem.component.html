<div class="menu-container">

  <h2>Restaurant Menu</h2>

  <!-- Admin Add Item -->
  <div *ngIf="userRole === 'Admin'" class="add-menu-form">

    <input
      type="number"
      [(ngModel)]="newItem.categoryId"
      placeholder="Category ID"
    />

    <input
      type="text"
      [(ngModel)]="newItem.itemName"
      placeholder="Item Name"
    />

    <input
      type="number"
      [(ngModel)]="newItem.price"
      placeholder="Price"
    />

    <button (click)="addMenuItem()">Add Item</button>

  </div>

  <!-- Menu Cards -->
  <div class="menu-grid">

    <div class="menu-card" *ngFor="let item of menuItems">

      <h3>{{ item.itemName }}</h3>
      <p>Price: ₹{{ item.price }}</p>
      <p>Available: {{ item.isAvailable ? 'Yes' : 'No' }}</p>

      <!-- Admin Controls -->
      <div *ngIf="userRole === 'Admin'" class="actions">

        <button (click)="updateMenuItem(item)">
          Update
        </button>

        <button (click)="deleteMenuItem(item.menuItemId)">
          Delete
        </button>

      </div>

    </div>

  </div>

</div>
<select [(ngModel)]="newItem.categoryId">
  <option value="0">Select Category</option>

  <option
    *ngFor="let category of categories"
    [value]="category.categoryId">

    {{ category.categoryName }}

  </option>
</select>
