<div class="chef-dashboard">

  <div class="top-bar">
    <h2>Chef Dashboard</h2>
    <button (click)="logout()">Logout</button>
  </div>

  <div class="welcome-box">
    <h3>Welcome {{ userEmail }}</h3>

    <div class="dashboard-card" (click)="goToOrders()">

      <p>View and update all food orders</p>
    </div>

  </div>

</div>
